<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ColorMath</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --text: #e8e8f0;
      --muted: #6a6a80;
      --accent: #7c6aef;
    }

    body {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 640px;
    }

    .logo {
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 0.25em;
      opacity: 0;
      animation: fadeUp 0.8s ease-out 0.2s forwards;
    }

    .logo .accent {
      background: linear-gradient(135deg, #7c6aef, #e06aef, #ef6a6a, #efcf6a, #6aefb8, #6a8eef, #7c6aef);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fadeUp 0.8s ease-out 0.2s forwards, gradientShift 8s ease infinite;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .tagline {
      font-size: clamp(0.9rem, 2vw, 1.15rem);
      color: var(--muted);
      font-weight: 400;
      line-height: 1.6;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease-out 0.5s forwards;
    }

    .color-bar {
      display: flex;
      gap: 4px;
      justify-content: center;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease-out 0.7s forwards;
    }

    .color-bar .swatch {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
      position: relative;
    }

    .color-bar .swatch:hover {
      transform: translateY(-4px) scale(1.1);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .swatch .tooltip {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) scale(0.9);
      background: #1a1a28;
      color: var(--text);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
    }

    .swatch:hover .tooltip {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    .formula {
      font-size: clamp(0.75rem, 1.5vw, 0.9rem);
      color: var(--muted);
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease-out 0.9s forwards;
      letter-spacing: 0.02em;
    }

    .formula span {
      color: var(--text);
      transition: color 0.4s;
    }

    .cta {
      display: inline-block;
      padding: 0.75rem 2rem;
      border: 1px solid rgba(124, 106, 239, 0.4);
      border-radius: 8px;
      color: var(--text);
      text-decoration: none;
      font-size: 0.9rem;
      font-family: inherit;
      cursor: pointer;
      background: rgba(124, 106, 239, 0.08);
      transition: all 0.3s ease;
      opacity: 0;
      animation: fadeUp 0.8s ease-out 1.1s forwards;
    }

    .cta:hover {
      background: rgba(124, 106, 239, 0.18);
      border-color: rgba(124, 106, 239, 0.7);
      box-shadow: 0 0 30px rgba(124, 106, 239, 0.15);
      transform: translateY(-1px);
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      z-index: 1;
      font-size: 0.7rem;
      color: var(--muted);
      opacity: 0;
      animation: fadeIn 1s ease-out 1.5s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>

  <div class="content">
    <h1 class="logo"><span class="accent">color</span>math</h1>

    <div class="color-bar" id="colorBar"></div>

    <p class="formula">
      <span>&Delta;E</span><sub>00</sub> = f(<span>L*</span>, <span>a*</span>, <span>b*</span>) &rarr; perceptual distance
    </p>


  </div>

  <footer>&copy; 2026 colormath.com</footer>

  <script>
    // --- Particle background ---
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    let W, H, particles;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function hslToHex(h, s, l) {
      s /= 100; l /= 100;
      const a = s * Math.min(l, 1 - l);
      const f = n => {
        const k = (n + h / 30) % 12;
        const c = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
        return Math.round(255 * c).toString(16).padStart(2, '0');
      };
      return `#${f(0)}${f(8)}${f(4)}`;
    }

    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.hue = Math.random() * 360;
        this.size = Math.random() * 2 + 0.5;
        this.speedX = (Math.random() - 0.5) * 0.3;
        this.speedY = (Math.random() - 0.5) * 0.3;
        this.alpha = Math.random() * 0.4 + 0.1;
        this.hueDrift = (Math.random() - 0.5) * 0.5;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.hue = (this.hue + this.hueDrift + 360) % 360;
        if (this.x < -10 || this.x > W + 10 || this.y < -10 || this.y > H + 10) this.reset();
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${this.hue}, 70%, 60%, ${this.alpha})`;
        ctx.fill();
      }
    }

    function initParticles() {
      const count = Math.min(Math.floor((W * H) / 8000), 200);
      particles = Array.from({ length: count }, () => new Particle());
    }

    function drawConnections() {
      const maxDist = 120;
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < maxDist) {
            const alpha = (1 - dist / maxDist) * 0.08;
            const hue = (particles[i].hue + particles[j].hue) / 2;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `hsla(${hue}, 60%, 50%, ${alpha})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
    }

    function animate() {
      ctx.clearRect(0, 0, W, H);
      particles.forEach(p => { p.update(); p.draw(); });
      drawConnections();
      requestAnimationFrame(animate);
    }

    resize();
    initParticles();
    animate();
    window.addEventListener('resize', () => { resize(); initParticles(); });

    // --- Color bar swatches ---
    const swatches = [
      { hex: '#ef4444', label: 'RGB(239, 68, 68)' },
      { hex: '#f97316', label: 'HSL(25, 95%, 53%)' },
      { hex: '#eab308', label: 'L*a*b*(75, 10, 78)' },
      { hex: '#22c55e', label: 'HSV(142, 71%, 77%)' },
      { hex: '#3b82f6', label: 'XYZ(22, 20, 72)' },
      { hex: '#8b5cf6', label: 'LCH(44, 72, 301)' },
      { hex: '#ec4899', label: 'CMYK(0, 69, 34, 7)' },
    ];

    const bar = document.getElementById('colorBar');
    swatches.forEach((s, i) => {
      const el = document.createElement('div');
      el.className = 'swatch';
      el.style.background = s.hex;
      el.style.animationDelay = `${0.7 + i * 0.06}s`;
      const tip = document.createElement('span');
      tip.className = 'tooltip';
      tip.textContent = s.label;
      el.appendChild(tip);
      bar.appendChild(el);
    });

    // --- Animate formula values ---
    const formulaSpans = document.querySelectorAll('.formula span');
    setInterval(() => {
      formulaSpans.forEach(sp => {
        const hue = Math.floor(Math.random() * 360);
        sp.style.color = `hsl(${hue}, 70%, 70%)`;
      });
    }, 2500);
  </script>
</body>
</html>
